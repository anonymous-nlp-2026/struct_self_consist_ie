### Model
model_name_or_path: ./models/Qwen/Qwen3-8B

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all

### Dataset
dataset_dir: ./data
dataset: scierc_uie_train
eval_dataset: scierc_uie_dev
template: qwen3

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
max_grad_norm: 1.0

### Evaluation
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 100

### Logging
logging_steps: 10
save_steps: 100
save_total_limit: 3

### Output
output_dir: ./checkpoints/qwen3-8b-scierc-lora
overwrite_output_dir: true
report_to: none

### Misc
seed: 42
cutoff_len: 2048
preprocessing_num_workers: 4
