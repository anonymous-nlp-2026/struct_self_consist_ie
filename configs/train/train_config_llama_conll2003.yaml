### Model
model_name_or_path: ./models/LLM-Research/Meta-Llama-3___1-8B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all

### Dataset
dataset_dir: ./data
dataset: conll2003_uie_train
eval_dataset: conll2003_uie_dev
template: llama3

### Training
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true
max_grad_norm: 1.0

### Evaluation
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 200

### Logging
logging_steps: 10
save_steps: 200
save_total_limit: 5
load_best_model_at_end: true
metric_for_best_model: eval_loss

### Output
output_dir: ./checkpoints/llama3.1-8b-conll2003-lora
overwrite_output_dir: true
report_to: none

### Misc
seed: 42
cutoff_len: 2048
preprocessing_num_workers: 4
