### Model
model_name_or_path: ./models/models--Qwen--Qwen2.5-32B-Instruct/snapshots/5ede1c97bbab6ce5cda5812749b4c0bdf79b18dd/

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all
quantization_bit: 4

### Dataset
dataset_dir: ./data
dataset: fewnerd_uie_train
eval_dataset: fewnerd_uie_dev
template: qwen

### Training
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true
max_grad_norm: 1.0

### Evaluation
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 1000

### Logging
logging_steps: 50
save_steps: 1000
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss

### Output
output_dir: ./checkpoints/qwen25-32b-fewnerd-qlora-s42
overwrite_output_dir: true
report_to: none

### Misc
seed: 42
cutoff_len: 2048
preprocessing_num_workers: 4
